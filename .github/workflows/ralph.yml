name: Ralph

# Autonomous "Ralph" loop — ONE iteration per run. Manual (workflow_dispatch) OR
# scheduled (cron) for hands-off burndown. Picks the highest-priority open
# `ralph-ready` issue (or the one you name), makes one small change, must pass
# ralph/gate.sh, and opens a PR. NEVER pushes to main. Auto-merge is handled by
# ralph-gate.yml + branch protection (site-engine only).
#
# Scheduled runs use the SAME CLAUDE_CODE_OAUTH_TOKEN (Max subscription) — there is
# NO ANTHROPIC_API_KEY and no metered billing anywhere in this loop.
#
# Safety: a `concurrency` group runs at most one Ralph per repo, and a single-flight
# guard skips a run when a Ralph PR is already open (no PR pile-up, even before
# auto-merge is enabled).

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to work (blank = pick highest-priority ralph-ready)"
        required: false
        type: string
  schedule:
    - cron: "0 */4 * * *" # every 4h; tune freely. Dry queue -> no PR; the loop stops itself.

concurrency:
  group: ralph-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ralph:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Single-flight guard — skip if a Ralph PR is already open
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open=$(gh pr list --repo "${{ github.repository }}" --state open \
            --json headRefName --jq '[.[] | select(.headRefName | startswith("ralph/"))] | length')
          if [ "${open:-0}" -gt 0 ]; then
            echo "A Ralph PR is already open ($open) — skipping this run to avoid pile-up."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.skip != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies (so ralph/gate.sh can run)
        if: steps.guard.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code — one Ralph iteration
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            Read ralph/prompt.md and AGENTS.md in this repo first — their rules are
            binding. Then do EXACTLY ONE Ralph iteration and STOP.

            A target issue may have been provided via the dispatch input: "${{ inputs.issue }}"
            - If that is an issue number, work THAT issue.
            - If it is blank (e.g. a scheduled run), pick the HIGHEST-PRIORITY open
              `ralph-ready` issue:
              gh issue list --label "ralph-ready" --state open
              (highest priority per ralph/prompt.md's order — NOT the first). If none
              exist, say so and stop.

            Binding rules (ralph/prompt.md + AGENTS.md "Ralph quality bar"):
            - ONE logical change, smallest complete slice. Comment the rest back on the issue.
            - `bash ralph/gate.sh` MUST pass green before any PR. Never weaken tests or
              types to pass it. Red gate = no PR.
            - Branch ralph/issue-<n>-<slug>. Open a PR with "Closes #<n>" in the body.
              Comment a 2-line summary on the issue.
            - NEVER merge, NEVER push to main yourself — the ralph-gate workflow handles
              merging after an independent review. A human owns the queue.
            - Append what you did to progress.txt.
            - If blocked or ambiguous, comment on the issue and STOP — do not force.

      - name: Notify Discord (run summary)
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret set — skipping Discord notify."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            *)       EMOJI="⚪" ;;
          esac
          curl -sS -H "Content-Type: application/json" \
            -d "$(printf '{"content":"%s Ralph run **%s** on `%s` — run log: %s"}' "$EMOJI" "$STATUS" "$REPO" "$RUN_URL")" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notify failed (non-fatal)."
