name: Ralph Gate

# Thin caller — the engine is ralph-gate-reusable.yml (org-shared; other repos
# call it as hirobius/ops/.github/workflows/ralph-gate-reusable.yml@main).
#
# ralph/* PRs: deterministic gate + independent AI review + HUMAN-approved
# merge (label the PR `ralph-approved`, or pre-tag the issue `ralph-auto` for
# batch approval) + one bounded self-heal on failure. Human PRs pass through.
# The `labeled` trigger is the approval fast-path: adding `ralph-approved`
# arms auto-merge without re-running the review.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  ralph-gate:
    uses: hirobius/ops/.github/workflows/ralph-gate-reusable.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      statuses: write
      id-token: write
    secrets: inherit
