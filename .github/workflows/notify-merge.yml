name: Notify merge (Discord)

# Pings DISCORD_WEBHOOK_URL for every push to main made with a USER token
# (interactive sessions, humans, MCP merges). Ralph's own auto-merges use
# GITHUB_TOKEN, which emits NO push event (GitHub's recursion guard) — those
# are pinged by the engine's gate at merge time (hirobius/ralph#11). The two
# halves together cover every merge to main.
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MSG_TITLE: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
          COMPARE: ${{ github.event.compare }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret — skipping."
            exit 0
          fi
          title=$(printf '%s' "$MSG_TITLE" | head -n1 | cut -c1-160)
          curl -sS -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "🟣 **Merged to main** on \`$REPO\` — $title (by $AUTHOR) $COMPARE" '{content:$c}')" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notify failed (non-fatal)."
