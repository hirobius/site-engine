name: Visual Regression

# Catches "fleet rebuild drift": a packages/* change that silently restyles the
# rendered template. Runs in the pinned Playwright container so rendering matches
# the committed baselines exactly.
on:
  pull_request:
    paths:
      - "packages/**"
      - "apps/_gallery/**"
      - ".github/workflows/visual.yml"
  workflow_dispatch:
    inputs:
      update:
        description: "Regenerate baselines and commit them back to the dispatched branch"
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    # contents: write lets the dispatched update run commit the refreshed
    # baselines directly (previously they were only uploaded as an artifact,
    # leaving a manual download-and-commit step).
    permissions:
      contents: write
    # Pinned to the resolved Playwright version so browsers + OS match baselines.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from "packageManager" in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build gallery
        run: pnpm --filter @hirobius/gallery build

      - name: Compare snapshots
        if: ${{ !inputs.update }}
        run: pnpm --filter @hirobius/gallery test:visual

      - name: Update snapshots (manual dispatch)
        if: ${{ inputs.update }}
        run: pnpm --filter @hirobius/gallery test:visual:update

      - name: Commit refreshed baselines to a branch (manual dispatch)
        if: ${{ inputs.update }}
        # main only accepts PRs (ralph-gate required), so the refreshed
        # baselines go to a visual-baselines/<run-id> branch; open a PR from
        # it and merge. The step summary carries the branch name.
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A apps/_gallery/tests
          if git diff --cached --quiet; then
            echo "Baselines unchanged — nothing to commit." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            BRANCH="visual-baselines/${GITHUB_RUN_ID}"
            git commit -m "test(visual): seed/refresh gallery baselines (dispatched run ${GITHUB_RUN_ID})"
            git push origin "HEAD:${BRANCH}"
            echo "Baselines pushed to \`${BRANCH}\` — open a PR from it to ${GITHUB_REF_NAME}." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      # On failure, the report contains expected/actual/diff PNGs to review.
      # The dispatched update commits the snapshots itself; the artifact below
      # remains as a review copy.
      - name: Upload report / snapshots
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-${{ inputs.update && 'snapshots' || 'report' }}
          path: |
            apps/_gallery/playwright-report/
            apps/_gallery/tests/**/*-snapshots/**
          retention-days: 7
          if-no-files-found: ignore
